# 每 3 天检测 nuget.org 上 ppy.osu.* 更新；有新版则提 PR，无冲突且可合并时自动 squash 合并
name: Update osu! NuGet dependencies

on:
  schedule:
    # 每天触发一次，job 内按 UTC 天数 % 3 决定是否真正执行（约每 3 天一次）
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump ppy.osu.* dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run (every 3 days for schedule)
        id: gate
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            Write-Host 'Manual run: always execute.'
            'run=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $daysSinceEpoch = [int]([DateTime]::UtcNow - [DateTime]'1970-01-01').TotalDays
          if ($daysSinceEpoch % 3 -ne 0) {
            Write-Host "Skipping: scheduled run only every 3 days (UTC day $daysSinceEpoch, mod 3 = $($daysSinceEpoch % 3))."
            'run=false' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          Write-Host "Running scheduled dependency check (UTC day $daysSinceEpoch)."
          'run=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-dotnet@v4
        if: steps.gate.outputs.run == 'true'
        with:
          dotnet-version: '8.0.x'

      - name: Check nuget.org for newer stable ppy.osu.* packages
        if: steps.gate.outputs.run == 'true'
        id: bump
        shell: pwsh
        run: ./.github/scripts/Update-DivaNuGetVersions.ps1

      - name: Verify build after bump
        if: steps.gate.outputs.run == 'true' && steps.bump.outputs.changed == 'true'
        run: dotnet build osu.Game.Rulesets.Diva/osu.Game.Rulesets.Diva.csproj -c Release

      - name: Create pull request
        if: steps.gate.outputs.run == 'true' && steps.bump.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: osu-bump
          commit-message: 'chore: bump ppy.osu.* NuGet dependencies'
          title: 'chore: bump ppy.osu.Game dependencies'
          body: |
            自动检测到 nuget.org 上有更新的官方 osu! 包（稳定版，不含 `-tachyon` 等后缀）：

            ${{ steps.bump.outputs.summary }}

            本地 CI 已验证 Release 构建通过；无冲突时将自动合并。

            #skip-changelog
          labels: dependencies
          delete-branch: true

      - name: Auto-merge when mergeable (no conflicts)
        if: steps.gate.outputs.run == 'true' && steps.bump.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $pr = '${{ steps.cpr.outputs.pull-request-number }}'
          Write-Host "Waiting for PR #$pr to become mergeable..."
          Start-Sleep -Seconds 8

          foreach ($attempt in 1..24) {
            $info = gh pr view $pr --json mergeable,mergeStateStatus | ConvertFrom-Json

            if ($info.mergeable -eq 'CONFLICTING') {
              Write-Host "PR #$pr has merge conflicts; leaving open for manual resolution."
              exit 0
            }

            if ($info.mergeable -eq 'MERGEABLE' -and $info.mergeStateStatus -eq 'CLEAN') {
              gh pr merge $pr --squash --delete-branch
              Write-Host "Merged PR #$pr (squash)."
              exit 0
            }

            Write-Host "Attempt ${attempt}: mergeable=$($info.mergeable) state=$($info.mergeStateStatus)"
            Start-Sleep -Seconds 10
          }

          Write-Host "PR not immediately mergeable; enabling auto-merge."
          gh pr merge $pr --squash --delete-branch --auto
